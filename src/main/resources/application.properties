# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}

# Hibernate
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

# JWT
mp.jwt.verify.publickey.location=keys/publicKey.pem
mp.jwt.verify.issuer=https://unify.com.br
smallrye.jwt.sign.key.location=keys/privateKey.pem
smallrye.jwt.new-token.lifespan=3600
smallrye.jwt.new-token.issuer=https://unify.com.br

# Token config
unify.jwt.access-token.expiration-minutes=60
unify.jwt.refresh-token.expiration-days=30

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${FRONTEND_ORIGINS:http://localhost:8081,http://127.0.0.1:8081}
%dev.quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
#quarkus.http.cors.access-control-max-age=24
quarkus.http.cors.access-control-allow-credentials=true

# Mailtrap / Mailer config
quarkus.mailer.host=${MAILTRAP_HOST}
quarkus.mailer.port=${MAILTRAP_PORT}
quarkus.mailer.username=${MAILTRAP_USERNAME}
quarkus.mailer.password=${MAILTRAP_PASSWORD}
quarkus.mailer.from=${MAILTRAP_FROM}
quarkus.mailer.mock=true
quarkus.mailer.tls=false
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.login=REQUIRED

# Email verification config
unify.mail.verification.expiration-hours=3

